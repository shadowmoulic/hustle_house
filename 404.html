<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 // Signal Lost | Hustle House</title>
    <link rel="icon" type="image/png" href="/logo.png">
    <link rel="stylesheet" href="/index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .error-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            position: relative;
            z-index: 10;
        }

        .error-code {
            font-size: clamp(8rem, 20vw, 15rem);
            font-weight: 900;
            line-height: 1;
            letter-spacing: -10px;
            margin-bottom: 0;
            background: linear-gradient(to bottom, #fff 0%, rgba(255,255,255,0.05) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0.8;
            font-family: 'Outfit', sans-serif;
        }

        .error-tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--primary);
            margin-bottom: 2rem;
            font-weight: 800;
        }

        .error-title {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            color: white;
            letter-spacing: -1px;
        }

        .error-desc {
            color: var(--text-secondary);
            max-width: 500px;
            margin-bottom: 3rem;
            line-height: 1.6;
        }

        .error-actions {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .secondary-btn {
            padding: 1.2rem 2.5rem;
            border-radius: 12px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            color: white;
            text-decoration: none;
            font-weight: 700;
            transition: var(--transition);
        }

        .secondary-btn:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }

        .glitch-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.05;
            background: url('https://media.giphy.com/media/oEI9uWUicKgZpP1Gha/giphy.gif');
            mix-blend-mode: overlay;
        }
    </style>
</head>
<body class="dark-theme">
    <div class="bg-mesh-container" style="display: block;">
        <div class="noise"></div>
        <div class="blur-blobs">
            <div class="blob blob-1"></div>
            <div class="blob blob-2"></div>
        </div>
    </div>

    <div class="glitch-overlay"></div>

    <div class="error-container">
        <div class="error-tag">System Exception // 404</div>
        <h1 class="error-code">404</h1>
        <h2 class="error-title">Path not found.</h2>
        <p class="error-desc">The requested signal has been lost in the IIT KGP grid. Let's redirect your mission to something more productive.</p>
        
        <div class="error-actions">
            <a href="/scoper" class="glow-button">Scope a Project</a>
            <a href="/contact" class="secondary-btn">Contact Founder</a>
            <a href="/" class="secondary-btn" style="border: none; opacity: 0.6;">Return to Base</a>
        </div>
    </div>

    <script>
        // Cursor Glow effect
        document.addEventListener('mousemove', (e) => {
            const blobs = document.querySelectorAll('.blob');
            blobs.forEach((blob, index) => {
                const speed = (index + 1) * 0.05;
                const x = (window.innerWidth - e.pageX * speed) / 100;
                const y = (window.innerHeight - e.pageY * speed) / 100;
                blob.style.transform = `translate(${x}px, ${y}px)`;
            });
        });
    </script>
</body>
</html>
