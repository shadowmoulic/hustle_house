<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join The House | Hustle House Onboarding</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤝</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../index.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        input:focus,
        select:focus,
        textarea:focus {
            border-color: var(--primary) !important;
            box-shadow: 0 0 15px var(--primary-glow);
            background: rgba(10, 10, 15, 0.8) !important;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        .success-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(15px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
        }

        .expertise-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-top: 0.5rem;
        }

        .expertise-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 0.75rem;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .expertise-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .expertise-item input {
            cursor: pointer;
            width: 18px;
            height: 18px;
        }
    </style>
</head>

<body>
    <div class="cursor-glow"></div>
    <div id="header-container"></div>

    <!-- Success Message Overlay -->
    <div id="success-overlay" class="success-overlay">
        <div class="glass" style="max-width: 500px; padding: 3rem; border-radius: 30px;">
            <div style="font-size: 5rem; margin-bottom: 1.5rem;">🌌</div>
            <h2 class="gradient-text" style="font-size: 2.5rem; margin-bottom: 1rem;">Welcome to the Hustle House.</h2>
            <p style="color: var(--text-secondary); line-height: 1.6; margin-bottom: 2rem;">Your application is secured.
                The founder will review your Proof of Work and reach out on WhatsApp shortly.</p>
            <a href="/" class="glow-button">Return to Base</a>
        </div>
    </div>

    <main style="padding-top: 150px; padding-bottom: 100px;">
        <section class="section">
            <div class="container" style="max-width: 850px;">
                <div class="section-header">
                    <div class="badge fade-in">IIT KGP Network</div>
                    <h1 class="section-title">Join The <span class="gradient-text">Hustle House.</span></h1>
                    <p class="section-subtitle">Apply to join the private hacker collective.</p>
                </div>

                <div class="moving-border-box fade-in">
                    <form id="onboarding-form" style="display: flex; flex-direction: column; gap: 1.5rem;">
                        <div class="form-row">
                            <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                                <label style="font-weight: 600; color: var(--text-secondary);">Full Name</label>
                                <input type="text" name="full_name" required placeholder="John Doe"
                                    style="padding: 1rem; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(5, 5, 5, 0.5); color: white; outline: none; transition: all 0.3s;">
                            </div>
                            <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                                <label style="font-weight: 600; color: var(--text-secondary);">IIT KGP Email</label>
                                <input type="email" name="email" required placeholder="name@kgpian.iitkgp.ac.in"
                                    style="padding: 1rem; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(5, 5, 5, 0.5); color: white; outline: none; transition: all 0.3s;">
                            </div>
                        </div>

                        <div style="display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 1.5rem;" class="form-row">
                            <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                                <label style="font-weight: 600; color: var(--text-secondary);">Roll Number</label>
                                <input type="text" name="roll_number" required placeholder="21CS100XX" maxlength="10"
                                    style="padding: 1rem; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(5, 5, 5, 0.5); color: white; outline: none; transition: all 0.3s;">
                            </div>
                            <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                                <label style="font-weight: 600; color: var(--text-secondary);">Department</label>
                                <select name="dept_year" required
                                    style="padding: 1rem; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(5, 5, 5, 0.5); color: white; outline: none; appearance: none; transition: all 0.3s;">
                                    <option value="" disabled selected>Select Dept</option>
                                    <option value="AE">Aerospace</option>
                                    <option value="AG">Agricultural</option>
                                    <option value="AR">Architecture</option>
                                    <option value="BT">Biotech</option>
                                    <option value="CH">Chemical</option>
                                    <option value="CE">Civil</option>
                                    <option value="CS">Computer Science</option>
                                    <option value="EE">Electrical</option>
                                    <option value="EC">Electronics</option>
                                    <option value="GG">Geology</option>
                                    <option value="MA">Mathematics</option>
                                    <option value="ME">Mechanical</option>
                                    <option value="MT">Metallurgical</option>
                                    <option value="MI">Mining</option>
                                    <option value="NA">Ocean/Naval</option>
                                    <option value="PH">Physics</option>
                                </select>
                            </div>
                            <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                                <label style="font-weight: 600; color: var(--text-secondary);">Grad Year</label>
                                <select name="grad_year" required
                                    style="padding: 1rem; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(5, 5, 5, 0.5); color: white; outline: none; transition: all 0.3s;">
                                    <option value="" disabled selected>Select</option>
                                    <option value="2024">2024</option>
                                    <option value="2025">2025</option>
                                    <option value="2026">2026</option>
                                    <option value="2027">2027</option>
                                    <option value="2028">2028</option>
                                    <option value="2029">2029</option>
                                    <option value="2030">2030</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-row">
                            <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                                <label style="font-weight: 600; color: var(--text-secondary);">WhatsApp Number</label>
                                <input type="tel" name="whatsapp" required placeholder="90623XXXXX" maxlength="13"
                                    style="padding: 1rem; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(5, 5, 5, 0.5); color: white; outline: none;">
                            </div>
                            <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                                <label style="font-weight: 600; color: var(--text-secondary);">Current Address
                                    (Home)</label>
                                <input type="text" name="address" required placeholder="Kolkata..."
                                    style="padding: 1rem; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(5, 5, 5, 0.5); color: white; outline: none;">
                            </div>
                        </div>

                        <div class="form-row">
                            <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                                <label style="font-weight: 600; color: var(--text-secondary);">LinkedIn URL</label>
                                <input type="url" name="linkedin_url" required placeholder="https://linkedin.com/in/..."
                                    style="padding: 1rem; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(5, 5, 5, 0.5); color: white; outline: none;">
                            </div>
                            <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                                <label style="font-weight: 600; color: var(--text-secondary);">Portfolio /
                                    GitHub</label>
                                <input type="url" name="portfolio" required placeholder="https://github.com/..."
                                    style="padding: 1rem; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(5, 5, 5, 0.5); color: white; outline: none;">
                            </div>
                        </div>

                        <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                            <label style="font-weight: 600; color: var(--text-secondary);">Your Specialties (Select all
                                that apply)</label>
                            <div class="expertise-grid">
                                <label class="expertise-item"><input type="checkbox" name="expertise" value="web-dev">
                                    Web Development</label>
                                <label class="expertise-item"><input type="checkbox" name="expertise" value="seo"> SEO &
                                    Growth</label>
                                <label class="expertise-item"><input type="checkbox" name="expertise"
                                        value="ai-automation"> AI Automation</label>
                                <label class="expertise-item"><input type="checkbox" name="expertise" value="design">
                                    UI/UX Design</label>
                                <label class="expertise-item"><input type="checkbox" name="expertise" value="video">
                                    Video Editing</label>
                                <label class="expertise-item"><input type="checkbox" name="expertise" value="marketing">
                                    Digital Marketing</label>
                            </div>
                        </div>

                        <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                            <label style="font-weight: 600; color: var(--text-secondary);">Describe your best
                                project</label>
                            <textarea name="bio" rows="3" required
                                placeholder="The most complex thing you've shipped..."
                                style="padding: 1rem; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(5, 5, 5, 0.5); color: white; outline: none; resize: none;"></textarea>
                        </div>

                        <button id="submit-btn" type="submit" class="glow-button"
                            style="width: 100%; border: none; cursor: pointer; justify-content: center;">Submit
                            Application</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-container"></div>
    <script src="../components.js"></script>
    <script src="../supabase.js"></script>
    <script>
        const form = document.getElementById('onboarding-form');
        const submitBtn = document.getElementById('submit-btn');
        const successOverlay = document.getElementById('success-overlay');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const originalText = submitBtn.innerText;
            submitBtn.innerText = 'Locking in...';
            submitBtn.disabled = true;

            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());

            // Handle multiple expertise checkboxes
            const expertise = formData.getAll('expertise').join(',');
            data.expertise = expertise;

            try {
                const { error } = await db
                    .from('hh_onboarding')
                    .insert([data]);

                if (error) throw error;
                successOverlay.style.display = 'flex';
                form.reset();
            } catch (error) {
                console.error('Submission error:', error);
                alert('Connection error. Ensure RLS is configured.');
            } finally {
                submitBtn.innerText = originalText;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
