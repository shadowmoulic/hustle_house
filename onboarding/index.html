<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join The House | Hustle House Onboarding</title>
    <link rel="icon" type="image/png" href="/logo.png">
    <link rel="shortcut icon" type="image/png" href="/logo.png">
    <link rel="apple-touch-icon" href="/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../index.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <div class="cursor-glow"></div>
    <div id="header-container"></div>

    <!-- Success Message Overlay -->
    <div id="success-overlay" class="success-overlay">
        <div class="glass" style="max-width: 500px; padding: 3rem; border-radius: 30px;">
            <div style="font-size: 5rem; margin-bottom: 1.5rem;">🌌</div>
            <h2 class="gradient-text" style="font-size: 2.5rem; margin-bottom: 1rem;">Welcome to the Hustle House.</h2>
            <p style="color: var(--text-secondary); line-height: 1.6; margin-bottom: 2rem;">Your application is secured.
                The founder will review your Proof of Work and reach out on WhatsApp shortly.</p>
            <a href="/" class="glow-button">Return to Base</a>
        </div>
    </div>

    <main style="padding-top: 3rem; padding-bottom: 2rem;">
        <section class="section">
            <div class="container" style="max-width: 850px;">
                <div class="section-header">
                    <div class="badge fade-in">IIT KGP Network</div>
                    <h1 class="section-title">Join The <span class="gradient-text">Hustle House.</span></h1>
                    <p class="section-subtitle">Apply to join the private hacker collective.</p>
                </div>

                <div class="moving-border-box fade-in">
                    <form id="onboarding-form" class="onboarding-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label>Full Name</label>
                                <input type="text" name="full_name" required placeholder="John Doe">
                            </div>
                            <div class="form-group">
                                <label>IIT KGP Email</label>
                                <input type="email" name="email" required placeholder="name@kgpian.iitkgp.ac.in">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label>Roll Number</label>
                                <input type="text" name="roll_number" required placeholder="21CS100XX" maxlength="10">
                            </div>
                            <div class="form-group">
                                <label>Graduation Year</label>
                                <select name="grad_year" required>
                                    <option value="" disabled selected>Select</option>
                                    <option value="2024">2024</option>
                                    <option value="2025">2025</option>
                                    <option value="2026">2026</option>
                                    <option value="2027">2027</option>
                                    <option value="2028">2028</option>
                                    <option value="2029">2029</option>
                                    <option value="2030">2030</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label>WhatsApp Number</label>
                                <input type="tel" name="whatsapp" required placeholder="90623XXXXX" maxlength="13">
                            </div>
                            <div class="form-group">
                                <label>Requested Subdomain</label>
                                <input type="text" name="custom_subdomain" required
                                    placeholder="john (for john.hustlehouse.io)" class="mono-input">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label>LinkedIn URL</label>
                                <input type="url" name="linkedin_url" required
                                    placeholder="https://linkedin.com/in/...">
                            </div>
                            <div class="form-group">
                                <label>Primary Portfolio / GitHub</label>
                                <input type="url" name="portfolio" required placeholder="https://github.com/...">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label>Additional Proof Links (Comma separated)</label>
                                <input type="text" name="additional_proof"
                                    placeholder="https://link1.com, https://link2.com">
                            </div>
                            <div class="form-group">
                                <label>Brand Accent Color</label>
                                <div class="color-picker-group">
                                    <input type="color" name="primary_color" value="#6250FF">
                                    <span>Pick your representative color</span>
                                </div>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Your Specialties (Categorized Expertise)</label>
                            <div class="expertise-grid">
                                <label class="expertise-item"><input type="checkbox" name="expertise" value="web-dev">
                                    Web Architecture</label>
                                <label class="expertise-item"><input type="checkbox" name="expertise" value="seo">
                                    Technical SEO</label>
                                <label class="expertise-item"><input type="checkbox" name="expertise"
                                        value="ai-automation"> AI & Automation</label>
                                <label class="expertise-item"><input type="checkbox" name="expertise" value="design">
                                    Brand Design</label>
                                <label class="expertise-item"><input type="checkbox" name="expertise" value="video">
                                    Narrative Editing</label>
                                <label class="expertise-item"><input type="checkbox" name="expertise" value="marketing">
                                    Growth Systems</label>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>The "North Star" Project</label>
                            <textarea name="bio" rows="3" required
                                placeholder="Describe the most complex project you've shipped. Link proof if possible."></textarea>
                        </div>

                        <button id="submit-btn" type="submit" class="glow-button">Submit Application</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-container"></div>
    <script src="../components.js"></script>
    <script src="../supabase.js"></script>
    <script>
        const form = document.getElementById('onboarding-form');
        const submitBtn = document.getElementById('submit-btn');
        const successOverlay = document.getElementById('success-overlay');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const originalText = submitBtn.innerText;
            submitBtn.innerText = 'Locking in...';
            submitBtn.disabled = true;

            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());

            // Handle multiple expertise checkboxes
            const expertise = formData.getAll('expertise').join(',');
            data.expertise = expertise;

            try {
                const { error } = await db
                    .from('hh_onboarding')
                    .insert([data]);

                if (error) throw error;
                successOverlay.style.display = 'flex';
                form.reset();
            } catch (error) {
                console.error('Submission error:', error);
                alert('Connection error. Ensure RLS is configured.');
            } finally {
                submitBtn.innerText = originalText;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
