<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Founder | Direct Access | Hustle House</title>
    <meta name="description"
        content="Hire from KGP Hustle House — India's only IIT-backed student agency. Contact the founder directly for high-priority projects.">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✉️</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../index.css">
</head>

<body>
    <div class="cursor-glow"></div>

    <div id="header-container"></div>

    <main style="padding-top: 150px; padding-bottom: 100px;">
        <section class="section">
            <div class="container" style="max-width: 800px;">
                <div class="section-header">
                    <div class="badge fade-in">Direct Line</div>
                    <h1 class="section-title">One Agency. <span class="gradient-text">Direct Access.</span></h1>
                    <p class="section-subtitle">Skip the agency fluff. Talk directly to the founder for custom builds
                        and high-priority sprints.</p>
                </div>

                <div class="moving-border-box fade-in">
                    <form id="contact-form" style="display: flex; flex-direction: column; gap: 1.5rem;">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                            <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                                <label for="name" style="font-weight: 600; color: var(--text-secondary);">Full
                                    Name</label>
                                <input type="text" id="name" required placeholder="John Doe"
                                    style="padding: 1rem; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(5, 5, 5, 0.5); color: white; outline: none; font-family: inherit;">
                            </div>
                            <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                                <label for="email" style="font-weight: 600; color: var(--text-secondary);">Work
                                    Email</label>
                                <input type="email" id="email" required placeholder="john@company.com"
                                    style="padding: 1rem; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(5, 5, 5, 0.5); color: white; outline: none; font-family: inherit;">
                            </div>
                        </div>
                        <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                            <label for="service" style="font-weight: 600; color: var(--text-secondary);">Service
                                Needed</label>
                            <select id="service"
                                style="padding: 1rem; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(5, 5, 5, 0.5); color: white; outline: none; font-family: inherit; appearance: none;">
                                <option value="web-dev">Web Development</option>
                                <option value="seo">SEO & Growth</option>
                                <option value="ai-automation">AI Automation</option>
                                <option value="design">Design & UI/UX</option>
                                <option value="video">Video Editing</option>
                                <option value="marketing">Digital Marketing</option>
                            </select>
                        </div>
                        <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                            <label for="message" style="font-weight: 600; color: var(--text-secondary);">Project
                                Details</label>
                            <textarea id="message" rows="5" required
                                placeholder="Tell us about your project goals and timeline..."
                                style="padding: 1rem; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(5, 5, 5, 0.5); color: white; outline: none; font-family: inherit; resize: vertical;"></textarea>
                        </div>
                        <button type="submit" class="glow-button"
                            style="width: 100%; border: none; cursor: pointer; justify-content: center;">Send Proposal
                            Request</button>
                    </form>
                </div>

                <div style="text-align: center; margin-top: 3rem;" class="fade-in-delayed">
                    <p style="color: var(--text-secondary); margin-bottom: 1rem;">Or message the founder directly for
                        high-priority projects:</p>
                    <a href="https://wa.me/919038315605" class="whatsapp-link" target="_blank">
                        <span>💬 Message Founder on WhatsApp</span>
                    </a>
                </div>

                <div style="margin-top: 5rem; text-align: center; color: var(--text-secondary);">
                    <p>Usually responds within <span style="color: var(--primary); font-weight: 700;">2-4 hours</span>
                        during business days.</p>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-container"></div>

    <script src="../components.js"></script>
    <script src="../main.js"></script>
    <script>
        document.getElementById('contact-form')?.addEventListener('submit', function (e) {
            e.preventDefault();
            alert('Proposal request sent! We will reach out on your email within the next few hours.');
            this.reset();
        });
    </script>
</body>

</html>
